<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpellingBee - Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #323437; --main: #e2b714; --sub: #646669;
            --text: #d1d0c5; --card: #2c2e31;
            --correct: #22c55e; --wrong: #ef4444;
            --edge: rgba(255,255,255,0.06);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace; overflow-x: hidden; }

        .screen { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .screen.active { display: block; opacity: 1; }

        .btn { background: transparent; color: var(--sub); border: 2px solid transparent; padding: 0.75rem 2rem; border-radius: 0.5rem; transition: 0.2s; cursor: pointer; font-weight: 700; font-family: 'Roboto Mono', monospace; }
        .btn:hover:not(:disabled) { color: var(--text); border-color: var(--sub); }
        .btn-primary { color: var(--main); border-color: var(--main); }
        .btn-primary:hover:not(:disabled) { background: var(--main); color: var(--bg); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .grade-btn.selected { border-color: var(--main); color: var(--main); background: rgba(226,183,20,0.1); }

        .status-indicator { width: 10px; height: 10px; border-radius: 50%; }
        .status-green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-red   { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        @keyframes shake { 0%,100%{transform:translateX(0)} 10%,30%,50%,70%,90%{transform:translateX(-8px)} 20%,40%,60%,80%{transform:translateX(8px)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .animate-shake { animation: shake 0.5s; }

        /* ── Typing area ── */
        .card { background: var(--card); border-radius: 10px; border: 1px solid var(--edge); }

        /* Word grid */
        #word-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 1.5rem;
            justify-content: center;
            min-height: 120px;
            align-content: flex-start;
        }

        .word-slot { display: flex; flex-direction: column; align-items: center; gap: 3px; animation: fadeUp 0.25s ease both; }
        .word-num  { font-size: 0.58rem; color: var(--sub); letter-spacing: 1px; user-select: none; }

        .word-input {
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--sub);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            padding: 0.45rem 0.6rem;
            outline: none;
            min-width: 72px;
            max-width: 200px;
            transition: border-color 0.15s, background 0.15s;
        }
        .word-input:focus { border-color: var(--main); background: rgba(0,0,0,0.35); }
        .word-input.correct { border-color: var(--correct); background: rgba(34,197,94,0.08); color: var(--correct); }
        .word-input.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.08);  color: var(--wrong); }
        .word-input:disabled { opacity: 0.55; cursor: default; }

        .word-hint { font-size: 0.65rem; min-height: 12px; color: var(--wrong); text-align: center; }
        .word-hint.ok { color: var(--correct); }

        /* Progress */
        .prog-track { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
        .prog-fill  { height: 100%; background: var(--main); transition: width 0.3s ease; border-radius: 2px; }

        /* Result diff */
        .diff-chip { display:inline-flex; flex-direction:column; align-items:center; margin:3px 4px; }
        .diff-num  { font-size:0.55rem; color:var(--sub); }
        .diff-word { font-size:0.88rem; font-weight:700; padding:2px 8px; border-radius:4px; }
        .diff-word.ok  { color:var(--correct); background:rgba(34,197,94,0.1); }
        .diff-word.bad { color:var(--wrong);   background:rgba(239,68,68,0.1); text-decoration:line-through; }
        .diff-exp  { font-size:0.65rem; color:var(--main); margin-top:1px; }

        /* stat cards */
        .stat-card { background:var(--card); border-radius:10px; border:1px solid var(--edge); padding:1.25rem; text-align:center; }
        .stat-card.accent { border-color:rgba(226,183,20,0.4); background:rgba(226,183,20,0.04); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="w-full p-6 flex justify-between items-center">
    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
        <i class="fa-solid fa-spell-check text-3xl" style="color:var(--main)"></i>
        <h1 class="text-2xl font-bold">Spelling<span style="color:var(--main)">Bee</span></h1>
    </div>
    <div class="flex items-center gap-4 text-sm" style="color:var(--sub)">
        <div class="flex items-center gap-2">
            <div id="status-dot" class="status-indicator status-red"></div>
            <span id="status-text">Connecting...</span>
        </div>
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-user"></i>
            <span id="display-name">Guest</span>
        </div>
        <button onclick="changeName()" class="btn text-xs px-3 py-1" id="change-name-btn" style="display:none">Schimbă Numele</button>
    </div>
</header>

<main class="flex-1 flex items-center justify-center p-6">

    <!-- CONNECTING -->
    <div id="connecting-screen" class="screen active text-center max-w-md w-full p-6">
        <div class="inline-block p-4 rounded-full mb-6" style="background:rgba(226,183,20,0.1)">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl" style="color:var(--main)"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2">Se conectează...</h2>
        <p class="text-sm" style="color:var(--sub)">Se stabilește conexiunea cu serverul</p>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="screen text-center max-w-md w-full p-6">
        <div class="mb-10">
            <div class="inline-block p-4 rounded-full mb-4" style="background:rgba(226,183,20,0.1)">
                <i class="fa-solid fa-user-astronaut text-4xl" style="color:var(--main)"></i>
            </div>
            <h2 class="text-3xl font-bold">Bine ai venit!</h2>
        </div>
        <div class="mb-8 text-left">
            <label class="text-xs font-bold ml-1 uppercase tracking-wider mb-2 block" style="color:var(--sub)">Nume Utilizator</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-user" style="color:var(--sub)"></i>
                </div>
                <input type="text" id="username-input"
                    class="w-full rounded-lg pl-12 pr-4 py-4 outline-none font-bold transition-all"
                    style="background:rgba(0,0,0,0.2);border:2px solid var(--sub);color:var(--text)"
                    placeholder="Introdu un Nume" maxlength="15" autocomplete="off"
                    onfocus="this.style.borderColor='var(--main)';this.style.background='rgba(0,0,0,0.4)'"
                    onblur="this.style.borderColor='var(--sub)';this.style.background='rgba(0,0,0,0.2)'"
                    onkeydown="if(event.key==='Enter') joinGame()">
            </div>
        </div>
        <div class="mb-10 text-left">
            <label class="text-xs font-bold ml-1 uppercase tracking-wider mb-2 block" style="color:var(--sub)">Selectează Clasa</label>
            <div class="grid grid-cols-3 gap-3" id="grade-buttons">
                <button onclick="selectGrade('1-4',this)" class="grade-btn btn w-full px-2 whitespace-nowrap" style="background:rgba(0,0,0,0.2)">1 - 4</button>
                <button onclick="selectGrade('5-9',this)" class="grade-btn btn w-full px-2 whitespace-nowrap" style="background:rgba(0,0,0,0.2)">5 - 9</button>
                <button onclick="selectGrade('10-12',this)" class="grade-btn btn w-full px-2 whitespace-nowrap" style="background:rgba(0,0,0,0.2)">10 - 12</button>
            </div>
        </div>
        <button onclick="joinGame()" class="btn btn-primary w-full py-4 text-lg flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-[0.98] transition-transform">
            <span>Intră</span><i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <!-- WAITING -->
    <div id="waiting-screen" class="screen text-center">
        <div style="animation:pulse 2.5s ease-in-out infinite">
            <i class="fa-solid fa-ear-listen text-6xl mb-6 block" style="color:var(--main)"></i>
        </div>
        <h2 id="waiting-title" class="text-3xl font-bold mb-2">Așteptare...</h2>
        <div id="spell-wait-round" class="text-sm mt-1 mb-8" style="color:var(--sub);letter-spacing:2px"></div>
        <div class="card p-4 inline-block min-w-[200px]">
            <p class="text-xs mb-1" style="color:var(--sub)">Speleri Conectați</p>
            <p class="text-4xl font-bold" id="waiting-count">0</p>
        </div>
    </div>

    <!-- GAME: word-by-word dictation -->
    <div id="game-screen" class="screen w-full max-w-4xl">

        <!-- Top bar -->
        <div class="flex justify-between items-center mb-4">
            <div>
                <div class="text-xs uppercase tracking-widest mb-1" style="color:var(--sub)">Dictare</div>
                <div id="spell-round-badge" class="font-bold text-sm" style="color:var(--main);letter-spacing:1px"></div>
            </div>
            <div class="text-right">
                <div class="text-xs mb-1" style="color:var(--sub)">Completate</div>
                <div class="text-lg font-bold" style="color:var(--main)">
                    <span id="filled-count">0</span><span style="color:var(--sub)"> / </span><span id="total-count">—</span>
                </div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="prog-track mb-4">
            <div id="game-prog" class="prog-fill" style="width:0%"></div>
        </div>

        <!-- Word slots -->
        <div class="card mb-4" style="min-height:140px">
            <div id="word-grid"></div>
        </div>

        <!-- Hint bar + submit -->
        <div class="flex justify-between items-center">
            <div class="text-xs" style="color:var(--sub)">
                <i class="fa-solid fa-circle-info mr-1"></i>
                <kbd style="background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px">Tab</kbd> / <kbd style="background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px">Enter</kbd> → următor &nbsp;·&nbsp;
                <kbd style="background:rgba(255,255,255,0.07);padding:1px 5px;border-radius:3px">Shift+Tab</kbd> → înapoi
            </div>
            <button id="submit-btn" onclick="submitDictation()" class="btn btn-primary px-8 py-3 text-base">
                <i class="fa-solid fa-paper-plane mr-2"></i> Trimite
            </button>
        </div>
    </div>

    <!-- RESULT -->
    <div id="result-screen" class="screen w-full max-w-4xl text-center">
        <h2 class="text-4xl font-bold mb-2">Rezultat</h2>
        <div id="res-round-badge" class="font-bold text-sm mb-8" style="color:var(--main);letter-spacing:1px"></div>

        <!-- Stat cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="stat-card accent">
                <div class="text-xs uppercase font-bold mb-1" style="color:var(--sub)">Acuratețe</div>
                <div class="text-5xl font-bold" style="color:var(--main)"><span id="res-accuracy">0</span>%</div>
            </div>
            <div class="stat-card">
                <div class="text-xs uppercase font-bold mb-1" style="color:var(--sub)">Corecte</div>
                <div class="text-4xl font-bold" style="color:var(--correct)">
                    <span id="res-correct">0</span><span class="text-xl" style="color:var(--sub)">/</span><span id="res-total">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="text-xs uppercase font-bold mb-1" style="color:var(--sub)">Percentilă</div>
                <div class="text-4xl font-bold text-blue-400"><span id="res-percentile">—</span>%</div>
            </div>
            <div class="stat-card">
                <div class="text-xs uppercase font-bold mb-1" style="color:var(--sub)">Rang</div>
                <div class="text-2xl font-bold" id="res-rank-display">—</div>
            </div>
        </div>

        <!-- Word-by-word diff -->
        <div class="card p-5 text-left mb-6" style="max-height:380px;overflow-y:auto">
            <div class="text-xs uppercase font-bold mb-3" style="color:var(--sub)">Detalii</div>
            <div id="diff-view" class="flex flex-wrap gap-1 leading-loose"></div>
        </div>

        <button onclick="switchScreen('waiting-screen')" class="btn px-8">Înapoi la Sală</button>
    </div>

</main>

<!-- Footer -->
<div class="fixed bottom-4 left-4 z-50 flex items-center gap-2 opacity-70 hover:opacity-100 transition-opacity">
    <i class="fa-solid fa-network-wired text-xs text-gray-500"></i>
    <span id="sync-indicator" class="text-xs text-gray-500 font-mono"></span>
</div>
<a href="https://github.com/Dany0443" target="_blank" rel="noopener noreferrer"
   class="fixed bottom-4 right-4 z-50 flex items-center gap-2 opacity-50 hover:opacity-100 transition-opacity cursor-pointer text-gray-500 hover:text-[#e2b714]">
    <span class="text-xs font-mono hidden sm:inline">Created by Dany0443</span>
    <i class="fa-brands fa-github text-xl"></i>
</a>

<script>
    const WS_URL       = `ws://${location.hostname || 'localhost'}:5889`;
    const LS_SESSION   = 'mt_session';
    const LS_DRAFT     = 'mt_spell_draft_v2'; // new key — v2 stores JSON array

    let ws, reconnectAttempts = 0;
    let hasJoined  = !!JSON.parse(localStorage.getItem(LS_SESSION) || 'null')?.userId;
    let selectedGrade = null;
    let myData     = { username: '', userId: '', grade: '' };
    let currentRound = 0, maxRounds = 3;

    // ── Dictation state ────────────────────────────────────────────────────
    let D = {
        active:    false,
        wordCount: 0,       // received from server
        inputs:    [],      // HTMLInputElement[]
        submitted: false
    };

    const allScreens = document.querySelectorAll('.screen');

    // ── Boot ───────────────────────────────────────────────────────────────
    window.onload = () => {
        const user = JSON.parse(localStorage.getItem(LS_SESSION) || 'null');
        if (user?.username && user?.grade) {
            document.getElementById('username-input').value = user.username;
            document.getElementById('display-name').textContent = user.username;
            selectedGrade = user.grade;
            selectGrade(user.grade, null);
            myData = user;
        }
        connect();
    };

    // ── Helpers ────────────────────────────────────────────────────────────
    function selectGrade(grade, btn) {
        selectedGrade = grade;
        document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
        if (btn) { btn.classList.add('selected'); return; }
        document.querySelectorAll('.grade-btn').forEach(b => {
            if (b.textContent.trim().replace(/\s*-\s*/g, '-') === grade) b.classList.add('selected');
        });
    }

    function switchScreen(id) {
        allScreens.forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
        const t = document.getElementById(id);
        if (t) { t.style.display = 'block'; setTimeout(() => t.classList.add('active'), 50); }
    }

    function updateRoundBadge() {
        if (!currentRound) return;
        const txt = `RUNDA ${currentRound} / ${maxRounds}`;
        ['spell-round-badge','spell-wait-round','res-round-badge'].forEach(id => {
            const el = document.getElementById(id); if (el) el.textContent = txt;
        });
    }

    // ── WebSocket ──────────────────────────────────────────────────────────
    function connect() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
            document.getElementById('status-dot').className = 'status-indicator status-green';
            document.getElementById('status-text').textContent = 'Conectat';
            reconnectAttempts = 0;
            const si = document.getElementById('sync-indicator');
            if (si) si.textContent = 'Connected';

            const user = JSON.parse(localStorage.getItem(LS_SESSION) || 'null');
            if (user?.userId && user?.username) {
                hasJoined = true; myData = user; selectedGrade = user.grade;
                document.getElementById('display-name').textContent = user.username;
                document.getElementById('change-name-btn').style.display = 'block';
                ws.send(JSON.stringify({ type:'JOIN_SPELL', userId:user.userId, username:user.username, grade:user.grade||'1-4' }));
                switchScreen('waiting-screen');
            } else {
                switchScreen('login-screen');
            }
        };

        ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(_){} };

        ws.onclose = () => {
            document.getElementById('status-dot').className = 'status-indicator status-red';
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
            reconnectAttempts++;
            document.getElementById('status-text').textContent = `Reconnecting in ${Math.floor(delay/1000)}s...`;
            const user = JSON.parse(localStorage.getItem(LS_SESSION) || 'null');
            if (!user?.userId) switchScreen('connecting-screen');
            setTimeout(connect, delay);
        };

        ws.onerror = () => {
            document.getElementById('status-dot').className = 'status-indicator status-red';
            document.getElementById('status-text').textContent = 'Connection Error';
        };
    }

    // ── Message handler ────────────────────────────────────────────────────
    function handleMsg(data) {
        switch (data.type) {
            case 'UPDATE_SPELLERS':
            case 'SPELL_LOBBY_UPDATE':
                document.getElementById('waiting-count').textContent = data.count || 0;
                break;

            case 'SYNC_STATE':
                if (data.mode === 'race' && !D.active) { window.location.href = 'index.html'; return; }
                if (data.currentRound) currentRound = data.currentRound;
                if (data.maxRounds)   maxRounds   = data.maxRounds;
                if (data.spellRoundActive && hasJoined) switchScreen('waiting-screen');
                break;

            case 'MODE_CHANGED':
                if (!D.active && data.mode === 'race') window.location.href = 'index.html';
                break;

            case 'SPELL_START':
                startDictation(data);
                break;

            case 'SPELL_RESULT_FULL':
                showResult(data);
                break;

            case 'SPELL_END':
                D.active = false;
                localStorage.removeItem(LS_DRAFT);
                switchScreen('waiting-screen');
                document.getElementById('waiting-title').textContent = 'Runda s-a terminat';
                document.getElementById('spell-wait-round').textContent = 'Așteptați instrucțiunile hostului';
                break;

            case 'SERIES_COMPLETE':
            case 'SERIES_OVER':
                switchScreen('waiting-screen');
                document.getElementById('waiting-title').textContent = '🏁 Seria s-a terminat!';
                document.getElementById('spell-wait-round').textContent = '';
                break;

            case 'JOIN_SUCCESS':
                switchScreen('waiting-screen');
                document.getElementById('change-name-btn').style.display = 'block';
                break;

            case 'KICKED':
                localStorage.removeItem(LS_SESSION);
                localStorage.removeItem(LS_DRAFT);
                {
                    const msg = document.createElement('div');
                    msg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:Roboto Mono,monospace;color:#d1d0c5';
                    msg.innerHTML = '<i class="fa-solid fa-ban" style="font-size:3rem;color:#ca4754"></i><p style="font-size:1.25rem;font-weight:700">Removed by host</p><p style="color:#646669;font-size:0.875rem">Reloading...</p>';
                    document.body.appendChild(msg);
                    setTimeout(() => location.reload(), 2000);
                }
                break;
        }
    }

    // ── Join ───────────────────────────────────────────────────────────────
    function joinGame() {
        const name = document.getElementById('username-input').value.trim();
        const ni   = document.getElementById('username-input');
        const gb   = document.getElementById('grade-buttons');
        if (!name || !selectedGrade) {
            if (!name)        { ni.classList.add('animate-shake'); setTimeout(()=>ni.classList.remove('animate-shake'),500); }
            if (!selectedGrade) { gb.classList.add('animate-shake'); setTimeout(()=>gb.classList.remove('animate-shake'),500); }
            return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            document.getElementById('status-text').textContent = 'Nu ești conectat...';
            return;
        }
        const existing = JSON.parse(localStorage.getItem(LS_SESSION) || 'null');
        const userId   = (existing?.username === name) ? existing.userId : ('sp_' + name.replace(/\s+/g,'_') + '_' + Date.now());
        const userData = { userId, username:name, grade:selectedGrade };
        localStorage.setItem(LS_SESSION, JSON.stringify(userData));
        myData = userData;
        document.getElementById('display-name').textContent = name;
        hasJoined = true;
        ws.send(JSON.stringify({ type:'JOIN_SPELL', userId, username:name, grade:selectedGrade }));
        switchScreen('waiting-screen');
        document.getElementById('change-name-btn').style.display = 'block';
    }

    function changeName() {
        localStorage.removeItem(LS_SESSION);
        localStorage.removeItem(LS_DRAFT);
        location.reload();
    }

    // ── Dictation: build word grid ─────────────────────────────────────────
    function startDictation(data) {
        localStorage.removeItem(LS_DRAFT);
        if (data.round) { currentRound = data.round; maxRounds = data.maxRounds || maxRounds; }

        const wc = data.wordCount || 0;
        D = { active:true, wordCount:wc, inputs:[], submitted:false };

        updateRoundBadge();
        document.getElementById('total-count').textContent = wc || '?';
        document.getElementById('filled-count').textContent = '0';
        document.getElementById('game-prog').style.width = '0%';

        buildGrid(wc);
        resetSubmitBtn();
        switchScreen('game-screen');

        // Restore draft (JSON array of strings)
        try {
            const raw = localStorage.getItem(LS_DRAFT);
            if (raw) {
                const vals = JSON.parse(raw);
                if (Array.isArray(vals)) {
                    vals.forEach((v, i) => { if (D.inputs[i] && v) D.inputs[i].value = v; });
                    updateProgress();
                }
            }
        } catch(_) {}

        setTimeout(() => { if (D.inputs[0]) D.inputs[0].focus(); }, 150);
    }

    function buildGrid(wordCount) {
        const grid = document.getElementById('word-grid');
        grid.innerHTML = '';
        D.inputs = [];

        const n = wordCount > 0 ? wordCount : 1; // at least 1 slot
        for (let i = 0; i < n; i++) {
            const { slot, input } = makeSlot(i);
            D.inputs.push(input);
            grid.appendChild(slot);
        }
    }

    function makeSlot(idx) {
        const slot  = document.createElement('div');
        slot.className = 'word-slot';
        slot.style.animationDelay = Math.min(idx * 0.025, 0.6) + 's';

        const num   = document.createElement('div');
        num.className = 'word-num';
        num.textContent = idx + 1;

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'word-input';
        input.autocomplete = 'off';
        input.autocorrect  = 'off';
        input.autocapitalize = 'none';
        input.spellcheck   = false;
        input.placeholder  = '···';
        input.dataset.idx  = idx;

        const hint = document.createElement('div');
        hint.className = 'word-hint';

        // Dynamic width
        input.addEventListener('input', () => {
            sizeInput(input);
            saveDraft();
            updateProgress();
        });

        // Navigation: Tab/Enter → next, Shift+Tab → prev
        input.addEventListener('keydown', e => {
            if (e.key === 'Tab' || e.key === 'Enter') {
                e.preventDefault();
                const next = parseInt(input.dataset.idx) + (e.shiftKey ? -1 : 1);
                if (D.inputs[next]) D.inputs[next].focus();
            }
        });

        slot.appendChild(num);
        slot.appendChild(input);
        slot.appendChild(hint);
        return { slot, input };
    }

    function sizeInput(input) {
        const len = Math.max(input.value.length, 3);
        input.style.minWidth = Math.min(len * 12 + 28, 200) + 'px';
    }

    function updateProgress() {
        const filled = D.inputs.filter(i => i.value.trim() !== '').length;
        const total  = D.inputs.length || 1;
        document.getElementById('filled-count').textContent = filled;
        document.getElementById('game-prog').style.width = (filled / total * 100) + '%';
    }

    function saveDraft() {
        if (!D.active) return;
        localStorage.setItem(LS_DRAFT, JSON.stringify(D.inputs.map(i => i.value)));
    }

    function resetSubmitBtn() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = false;
        btn.dataset.armed = '';
        btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> Trimite';
        btn.style.background = '';
        btn.style.color = '';
    }

    // ── Submit ─────────────────────────────────────────────────────────────
    function submitDictation() {
        if (!D.active || D.submitted) return;
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            document.getElementById('status-text').textContent = 'Nu ești conectat...';
            return;
        }

        const words   = D.inputs.map(i => i.value.trim());
        const hasAny  = words.some(w => w !== '');
        if (!hasAny) {
            D.inputs.forEach(i => {
                i.style.borderColor = 'var(--wrong)';
                setTimeout(() => { i.style.borderColor = ''; }, 1000);
            });
            if (D.inputs[0]) D.inputs[0].focus();
            return;
        }

        const btn = document.getElementById('submit-btn');

        if (!btn.dataset.armed) {
            // Arm: show warning if blanks remain
            btn.dataset.armed = '1';
            const blanks = words.filter(w => w === '').length;
            const label  = blanks > 0
                ? `<i class="fa-solid fa-triangle-exclamation mr-2"></i>${blanks} necompletate — Confirmă`
                : `<i class="fa-solid fa-check mr-2"></i> Confirmă Trimiterea`;
            btn.innerHTML = label;
            btn.style.background = 'var(--main)';
            btn.style.color = '#323437';
            setTimeout(() => {
                if (btn.dataset.armed) { btn.dataset.armed = ''; resetSubmitBtn(); }
            }, 4000);
            return;
        }

        // Confirmed — submit
        D.submitted = true;
        D.active    = false;
        btn.dataset.armed = '';
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Trimis!';
        btn.style.background = '';
        btn.style.color = '';
        D.inputs.forEach(i => { i.disabled = true; });
        localStorage.removeItem(LS_DRAFT);

        ws.send(JSON.stringify({ type:'SPELL_SUBMIT_FULL', text: words.join(' ') }));
    }

    // ── Result display ─────────────────────────────────────────────────────
    function showResult(data) {
        switchScreen('result-screen');

        document.getElementById('res-accuracy').textContent   = data.accuracy ?? 0;
        document.getElementById('res-correct').textContent    = data.correctCount ?? 0;
        document.getElementById('res-total').textContent      = data.totalWords ?? 0;
        document.getElementById('res-percentile').textContent = data.stats?.percentile ?? '—';

        const rankEl = document.getElementById('res-rank-display');
        if (data.stats?.rank && data.stats?.totalSpellers) {
            const medals = ['🥇','🥈','🥉'];
            const medal = medals[data.stats.rank - 1] || '';
            rankEl.textContent = `${medal} #${data.stats.rank} / ${data.stats.totalSpellers}`;
            rankEl.style.color = data.stats.rank <= 3 ? 'var(--main)' : 'var(--text)';
        } else {
            rankEl.textContent = '—';
        }

        if (currentRound) {
            const rb = document.getElementById('res-round-badge');
            if (rb) rb.textContent = `RUNDA ${currentRound} / ${maxRounds}`;
        }

        // Build diff
        const container = document.getElementById('diff-view');
        container.innerHTML = '';
        if (data.diff && Array.isArray(data.diff)) {
            data.diff.forEach((item, i) => {
                const chip = document.createElement('div');
                chip.className = 'diff-chip';

                const num = document.createElement('div');
                num.className = 'diff-num';
                num.textContent = i + 1;

                const word = document.createElement('div');
                word.className = 'diff-word ' + (item.status === 'correct' ? 'ok' : 'bad');
                word.textContent = item.word || '—';

                chip.appendChild(num);
                chip.appendChild(word);

                if (item.status !== 'correct' && item.expected) {
                    const exp = document.createElement('div');
                    exp.className = 'diff-exp';
                    exp.textContent = item.expected;
                    chip.appendChild(exp);
                }

                container.appendChild(chip);
            });
        }

        // Confetti
        const acc = data.accuracy || 0;
        if (acc === 100) {
            confetti({ particleCount:200, spread:100, origin:{y:0.6} });
        } else if (acc >= 80) {
            confetti({ particleCount:60, spread:60, origin:{y:0.7}, colors:['#e2b714','#fff'] });
        }
    }
</script>
